name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + types + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps
        working-directory: workers
        run: uv sync --extra dev

      - name: Ruff lint
        working-directory: workers
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: workers
        run: uv run ruff format --check .

      - name: Pyright
        working-directory: workers
        run: uv run pyright

      - name: Pytest
        working-directory: workers
        run: uv run pytest -q

  web:
    name: Web lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        run: pnpm build

  sql:
    name: SQL lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sqlfluff
        run: |
          pip install sqlfluff==3.1.1
          sqlfluff lint --dialect postgres supabase/migrations/ || true
        # Currently advisory; flip to strict after migrations stabilize.
