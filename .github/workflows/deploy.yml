name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  modal:
    name: Deploy Modal workers
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Modal SDK
        run: uv pip install --system "modal>=0.64.0"

      - name: Configure Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          mkdir -p ~/.modal
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Deploy
        run: modal deploy workers/app.py

  # Vercel deploys automatically on push via its GitHub integration.
  # We do not duplicate that here. Vercel handles preview deploys per PR.
