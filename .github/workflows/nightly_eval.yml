name: Nightly Eval

on:
  schedule:
    - cron: "0 7 * * *"     # 07:00 UTC daily
  workflow_dispatch:

jobs:
  golden:
    name: Run pipeline on golden PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        working-directory: workers
        run: uv sync --extra dev

      - name: Run golden eval
        working-directory: workers
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run python -m tests.eval.run_golden \
            --pdfs ../tests/golden_pdfs \
            --out ../tests/eval/results-$(date +%Y%m%d).json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-eval-results
          path: tests/eval/results-*.json
